<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negocio - Punto de Venta</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
<div id="toast-container" class="toast-container"></div>

<nav>
    <button type="button" onclick="mostrarSeccion('productos')">Inventario</button>
    <button type="button" onclick="mostrarSeccion('ventas')">Punto de Venta</button>
    <button type="button" onclick="mostrarSeccion('historial')">Historial y Totales</button>
</nav>

<main>
    <section id="sec-productos">
        <h2>Gestión de Mercancía</h2>
        <form id="form-producto" class="form-grid">
            <input type="hidden" id="prod-id" value="">
            <input type="text" id="prod-nombre" placeholder="Nombre" required>
            <input type="text" id="prod-descripcion" placeholder="Descripción">
            <input type="text" id="prod-categoria" placeholder="Categoría (Ej: Bebidas)">

            <input type="number" id="prod-precio" placeholder="Precio ($)" step="0.01" min="0" required>
            <input type="number" id="prod-stock" placeholder="Stock Inicial (Pza o Kg)" step="0.01" min="0" required>

            <button type="submit" id="btn-form-producto" class="btn btn-primary">Guardar Producto</button>
            <button type="button" id="btn-cancelar-edicion" onclick="limpiarFormulario()" class="btn btn-secondary" style="display:none;">Cancelar</button>
        </form>

        <div class="search-box">
            <label>Filtrar Inventario</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="busqueda-inventario" oninput="filtrarInventario()" placeholder="🔍 Escribe el nombre para buscar...">
                <button type="button" onclick="verFaltantes()" class="btn btn-warning" style="width: auto; white-space: nowrap;">📝 Ver Faltantes</button>
            </div>
        </div>

        <div class="table-responsive">
            <div id="panel-resumen-faltantes" style="display:none; background: #fff7ed; border: 1px solid #ffedd5; padding: 15px; border-radius: 8px; margin-bottom: 15px; color: #9a3412;"></div>
            <table id="tabla-productos">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <section id="sec-ventas" style="display:none;">
        <h2>Punto de Venta</h2>

        <div class="search-box">
            <label>Buscar Mercancía Para Vender</label>
            <input type="text" id="input-busqueda" placeholder="🔍 Escribe el nombre del producto..." oninput="filtrarProductos()">
        </div>

        <div class="pos-container">
            <div class="panel">
                <h3>Resultados de Búsqueda</h3>
                <div id="lista-seleccion"></div>
            </div>

            <div class="panel">
                <h3>Ticket de Compra</h3>
                <ul id="lista-carrito"></ul>

                <h3 id="total-venta">Total: $0.00</h3>

                <div class="payment-box">
                    <label style="font-size: 12px; color: #64748b; font-weight: bold; display: block; margin-bottom: 8px;">DINERO RECIBIDO</label>
                    <input type="number" id="pago-cliente" oninput="calcularCambio()" placeholder="$0.00" step="0.5" min="0">
                    <div id="cambio-venta" class="cambio-text" style="color: var(--success);">Cambio: $0.00</div>
                </div>

                <button type="button" onclick="confirmarVenta()" class="btn btn-primary" style="font-size: 18px; padding: 15px;">Finalizar Venta</button>
            </div>
        </div>
    </section>

    <section id="sec-historial" style="display:none;">
        <h2>Resumen de Ventas</h2>

        <div class="hero-card">
            <p>Total Vendido Hoy</p>
            <span id="suma-total">$0.00</span>
        </div>

        <div class="table-responsive">
            <table id="tabla-ventas">
                <thead>
                <tr>
                    <th>ID Venta</th>
                    <th>Fecha y Hora</th>
                    <th>Total</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>
</main>
<script src="app.js?v=2.0"></script>
</body>
</html>
